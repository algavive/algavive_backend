name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: secrets 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Create wrangler.prod.toml
        env:
          DB_ID: ${{ secrets.D1_DATABASE_ID }}
        run: |
          echo "name = \"backend\"" > wrangler.prod.toml
          echo "main = \"src/index.ts\"" >> wrangler.prod.toml
          echo "compatibility_date = \"2024-12-01\"" >> wrangler.prod.toml
          echo "" >> wrangler.prod.toml
          echo "[[d1_databases]]" >> wrangler.prod.toml
          echo "binding = \"DB\"" >> wrangler.prod.toml
          echo "database_name = \"algavive-db\"" >> wrangler.prod.toml
          echo "database_id = \"$DB_ID\"" >> wrangler.prod.toml
          cat wrangler.prod.toml

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npx wrangler deploy --config wrangler.prod.toml